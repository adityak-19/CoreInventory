{% extends "base.html" %}
{% block auth_content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon" style="width:32px;height:32px;background:#1a1a18;border-radius:8px;display:flex;align-items:center;justify-content:center;">
        <svg viewBox="0 0 16 16" fill="#f8f7f4" width="16" height="16"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>
      </div>
      <span style="font-size:15px;font-weight:500;font-family:'IBM Plex Sans',sans-serif">CoreInventory</span>
    </div>
    <div class="auth-title">Forgot Password</div>
    <div class="auth-sub">Enter your email to receive a reset OTP</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/forgot-password">
      <div class="form-row">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="admin@core.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Send OTP</button>
    </form>

    <div class="auth-foot" style="margin-top:20px;">
      Remembered your password? <a href="/login">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
